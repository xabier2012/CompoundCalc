<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}" lang="en">
<head><title th:text="#{index.title}">Home</title></head>
<body>
<div layout:fragment="content">

    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-primary">
            <i class="fas fa-coins me-2"></i><span th:text="#{index.title}">Calculadora</span>
        </h1>
        <p class="lead text-body-secondary mt-3" th:text="#{index.subtitle}">Subtitle</p>
    </div>

    <div class="row g-4 justify-content-center">
        <!-- Simple card -->
        <div class="col-lg-5 col-md-6">
            <div class="card shadow-lg h-100 border-0 card-hover">
                <div class="card-body text-center p-4 p-lg-5">
                    <div class="feature-icon bg-primary bg-gradient text-white rounded-circle mb-3 mx-auto">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <h3 class="card-title fw-bold" th:text="#{index.simple.title}">Simple</h3>
                    <p class="card-text text-body-secondary" th:text="#{index.simple.desc}">Desc</p>
                    <ul class="list-unstyled text-start mb-4">
                        <li class="mb-1"><i class="fas fa-check text-success me-2"></i><span th:text="#{index.simple.f1}">f1</span></li>
                        <li class="mb-1"><i class="fas fa-check text-success me-2"></i><span th:text="#{index.simple.f2}">f2</span></li>
                        <li class="mb-1"><i class="fas fa-check text-success me-2"></i><span th:text="#{index.simple.f3}">f3</span></li>
                        <li class="mb-1"><i class="fas fa-check text-success me-2"></i><span th:text="#{index.simple.f4}">f4</span></li>
                    </ul>
                    <a th:href="@{/simple}" class="btn btn-primary btn-lg px-5 rounded-pill">
                        <i class="fas fa-play me-2"></i><span th:text="#{index.simple.btn}">Start</span>
                    </a>
                </div>
            </div>
        </div>
        <!-- Complex card -->
        <div class="col-lg-5 col-md-6">
            <div class="card shadow-lg h-100 border-0 card-hover">
                <div class="card-body text-center p-4 p-lg-5">
                    <div class="feature-icon bg-warning bg-gradient text-white rounded-circle mb-3 mx-auto">
                        <i class="fas fa-chart-area"></i>
                    </div>
                    <h3 class="card-title fw-bold" th:text="#{index.complex.title}">Complex</h3>
                    <p class="card-text text-body-secondary" th:text="#{index.complex.desc}">Desc</p>
                    <ul class="list-unstyled text-start mb-4">
                        <li class="mb-1"><i class="fas fa-check text-warning me-2"></i><span th:text="#{index.complex.f1}">f1</span></li>
                        <li class="mb-1"><i class="fas fa-check text-warning me-2"></i><span th:text="#{index.complex.f2}">f2</span></li>
                        <li class="mb-1"><i class="fas fa-check text-warning me-2"></i><span th:text="#{index.complex.f3}">f3</span></li>
                        <li class="mb-1"><i class="fas fa-check text-warning me-2"></i><span th:text="#{index.complex.f4}">f4</span></li>
                    </ul>
                    <a th:href="@{/complex}" class="btn btn-warning btn-lg px-5 rounded-pill">
                        <i class="fas fa-rocket me-2"></i><span th:text="#{index.complex.btn}">Start</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Formula -->
    <div class="row mt-5">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4">
                        <i class="fas fa-graduation-cap text-primary me-2"></i><span th:text="#{index.formula.title}">Formula</span>
                    </h4>
                    <div class="text-center">
                        <p class="fs-3 font-monospace text-primary fw-bold">A = P &times; (1 + r/n)<sup>nt</sup></p>
                        <div class="row text-body-secondary mt-3">
                            <div class="col-md-3"><strong>A</strong> &ndash; <span th:text="#{index.formula.A}">Final</span></div>
                            <div class="col-md-3"><strong>P</strong> &ndash; <span th:text="#{index.formula.P}">Principal</span></div>
                            <div class="col-md-3"><strong>r</strong> &ndash; <span th:text="#{index.formula.r}">Rate</span></div>
                            <div class="col-md-3"><strong>n</strong>, <strong>t</strong> &ndash; <span th:text="#{index.formula.nt}">n,t</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
