spring.application.name=compound-interest-calculator
server.port=8080
server.forward-headers-strategy=framework

# Hide internal details on error pages
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Thymeleaf (cache enabled in prod; override with -Dspring.thymeleaf.cache=false for dev)
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Locale cookie (Secure flag conditional — default true for production HTTPS,
# set APP_COOKIE_SECURE=false for local HTTP development)
app.cookie.secure=${APP_COOKIE_SECURE:true}

# Actuator (only expose health; do not leak app internals)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.info.env.enabled=false
management.info.java.enabled=false
management.info.os.enabled=false

# Logging (INFO in prod; override with LOGGING_LEVEL_COM_CALCULATOR=DEBUG for dev)
logging.level.com.calculator=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
